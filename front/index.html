<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>یادگیری خرد؛ برای ذهنی که می‌خواهد کلان ببیند</title>
  </head>
  <body class="font-vazir">
    <script>
      // Inline bootstrap — runs before Vue so the first paint already
      // carries the right `dark` class, lang, and dir, avoiding a flash
      // of wrong theme/direction.
      (function () {
        var root = document.documentElement;

        try {
          var stored = localStorage.getItem('ml.theme.v1');
          var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (sysDark ? 'dark' : 'light');
          if (theme === 'dark') root.classList.add('dark');
          root.style.colorScheme = theme;
        } catch (e) { /* noop */ }

        try {
          var locStored = localStorage.getItem('ml.locale.v1');
          var navTag = (navigator && navigator.language || 'fa').toLowerCase();
          var locale = (locStored === 'fa' || locStored === 'en')
            ? locStored
            : (navTag.indexOf('en') === 0 ? 'en' : 'fa');
          root.lang = locale;
          root.dir  = locale === 'fa' ? 'rtl' : 'ltr';
        } catch (e) { /* noop */ }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
