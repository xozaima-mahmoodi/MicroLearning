<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>یادگیری خرد؛ برای ذهنی که می‌خواهد کلان ببیند</title>
  </head>
  <body class="font-vazir">
    <script>
      // Inline theme bootstrap — runs before Vue so the first paint already
      // carries the right `dark` class and avoids a flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('ml.theme.v1');
          var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (sysDark ? 'dark' : 'light');
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          root.style.colorScheme = theme;
        } catch (e) { /* noop */ }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
